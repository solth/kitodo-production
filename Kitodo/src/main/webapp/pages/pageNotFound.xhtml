<ui:composition
        template="/WEB-INF/templates/base.xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:p="http://primefaces.org/ui">

    <ui:define name="content">

        <h:panelGroup id="pageNotFoundContainer"
                      layout="block">

            <p:panel styleClass="page-not-found-header">
                <ui:insert name="contentHeader">
                    <h:outputText value="#{err['standardErrorMessages.404']}"/>
                </ui:insert>
            </p:panel>

            <h:panelGroup layout="block"
                          id="pageNotFoundImageContainer">
                <h:graphicImage id="pageNotFoundImage"
                                alt="Page missing"
                                name="images/missing-page-404-white.png"/>
            </h:panelGroup>
        </h:panelGroup>

    </ui:define>
</ui:composition>
